name: mesk_islamic_app
description: Mesk - A comprehensive Islamic daily practices app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Prayer Times
  adhan: ^2.0.0+1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Local Storage
  shared_preferences: ^2.3.4

  # Fonts
  google_fonts: ^6.2.1

  # Haptics
  vibration: ^2.0.0

  # Intl
  intl: ^0.20.0

  # SVG
  flutter_svg: ^2.0.16

  # Audio Player
  just_audio: ^0.9.40

  # HTTP Client
  dio: ^5.8.0+1

  # File System
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.1

  # UUID
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.4
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/sounds/
