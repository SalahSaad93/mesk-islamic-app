name: mesk_islamic_app
description: Mesk - A comprehensive Islamic daily practices app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Prayer Times
  adhan: ^2.0.0+1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Local Storage
  shared_preferences: ^2.3.4

  # Fonts
  google_fonts: ^6.2.1

  # Haptics
  vibration: ^2.0.0

  # Intl
  intl: ^0.20.0

  # Hijri Calendar
  hijri: ^3.0.0

  # SVG
  flutter_svg: ^2.0.16

  # Audio Player
  just_audio: ^0.9.40

  # HTTP Client
  dio: ^5.8.0+1

  # File System
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.1

  # UUID
  uuid: ^4.5.1
  sqflite: ^2.4.2
  scrollable_positioned_list: ^0.3.8
  share_plus: 10.1.4
  path: ^1.9.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_compass: ^0.8.1
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.6.0+eol
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/reciters.json
    - assets/data/daily_verses.json
    - assets/data/quran_verses.json
    - assets/data/quran_translation_en.json
    - assets/data/surahs.json
    - assets/data/
    - assets/images/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito/Nunito-Black.ttf
          weight: 900
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans/DMSans-Bold.ttf
          weight: 700

